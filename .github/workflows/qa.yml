name: QA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/linguaquest_ai?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/linguaquest_ai?schema=public
      AI_PROVIDER: openai
      OPENAI_API_KEY: ci-placeholder
      NEXT_PUBLIC_ENABLE_MOCK_AI: "true"
      NEXT_PUBLIC_ENABLE_MOCK_SPEECH: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run env:check
      - run: npm run prisma:generate
      - run: npm run content:export
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
